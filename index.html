<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerador de Capas Kikker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="card">
        <h1>Gerador de Capas para WhatsApp</h1>
        <p>Siga os passos abaixo para gerar a capa do grupo.</p>
        <hr>

        <div class="main-content">
            <div class="controls">
                <h3>1. Upload do Logo do Cliente</h3>
                <input type="file" id="upload" accept="image/*">
                
                <br><br>
                
                <button onclick="generateImage()" class="btn-gerar">2. Gerar Capa</button>
                
                <br><br>

                <a id="download" download="capa-grupo.png" class="btn-download" style="display:none;">3. Baixar Imagem Pronta</a>
            </div>

            <div class="preview-area">
                <h3>Pré-visualização</h3>
                <canvas id="canvas" width="500" height="500"></canvas>
            </div>
        </div>
        
        <hr>
        <footer style="font-size: 12px; color: #666;">
            © 2026 Kikker. Todos os direitos reservados.
        </footer>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
